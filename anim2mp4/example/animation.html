<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>anim2mp4 example</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #10131a; }
  .stage { position: relative; width: 100%; height: 100%; }
  .ball {
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffe27a, #ff7a3d);
    top: 0; left: 0;
  }
  .label {
    position: absolute;
    top: 16px; left: 16px;
    color: #fff;
    font-family: sans-serif;
    font-size: 18px;
    opacity: 0;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="ball" id="ball"></div>
    <div class="label" id="label">anim2mp4</div>
  </div>

  <script>
    const ball = document.getElementById('ball');
    const label = document.getElementById('label');

    // Single source of truth for "what does the scene look like at time t".
    // No CSS @keyframes/transitions are involved: every frame is computed
    // from scratch so the capture script can land on any t deterministically.
    window.Anim = {
      duration: 4,
      setTime(t) {
        const w = window.innerWidth - 60;
        const h = window.innerHeight - 60;
        const p = t / this.duration;

        const x = w * (0.5 + 0.5 * Math.sin(p * Math.PI * 2));
        const y = h * (0.5 + 0.5 * Math.cos(p * Math.PI * 2));
        ball.style.transform = `translate(${x}px, ${y}px)`;

        label.style.opacity = p > 0.15 && p < 0.85 ? '1' : '0';
      },
    };

    // Render an initial frame so the page isn't blank before capture starts.
    window.Anim.setTime(0);

    // Live preview only: when this page is opened in a normal browser
    // (i.e. NOT being driven frame-by-frame by capture.js), loop setTime()
    // over wall-clock time so the animation is visible. capture.js sets
    // window.__ANIM2MP4_CAPTURE__ before any page script runs, so this
    // loop never runs — and never competes with capture.js — during an
    // actual export.
    if (!window.__ANIM2MP4_CAPTURE__) {
      let start = null;
      const loop = (now) => {
        if (start === null) start = now;
        const t = ((now - start) / 1000) % window.Anim.duration;
        window.Anim.setTime(t);
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
