<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PracticeCss — Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #111;
    color: #eee;
    min-height: 100vh;
    padding: 60px 24px;
  }
  h1 {
    text-align: center;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 48px;
    color: #fff;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .card {
    display: block;
    background: #1b1b1b;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    border: 1px solid #2a2a2a;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #555;
  }
  .thumb {
    height: 160px;
    background: linear-gradient(to bottom, #1b1f4b, #ff7e5f, #ffd194);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb.garden {
    background: linear-gradient(to bottom, #1f8fa0, #b5dab3, #fdef9b);
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card .label {
    padding: 16px 18px;
  }
  .card .label .title {
    font-size: 15px;
    font-weight: 600;
  }
  .card .label .sub {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <h1>PracticeCss</h1>
  <div class="grid">
    <a class="card" href="css-art/mountain-sunset/">
      <div class="thumb"></div>
      <div class="label">
        <div class="title">Mountain Sunset</div>
        <div class="sub">Pure CSS — no images</div>
      </div>
    </a>
    <a class="card" href="svg-recreations/garden-river/">
      <div class="thumb garden">
        <img src="svg-recreations/garden-river/garden-river.svg" alt="Spring river garden">
      </div>
      <div class="label">
        <div class="title">Spring River Garden</div>
        <div class="sub">SVG vector trace recreation</div>
      </div>
    </a>
  </div>
</body>
</html>
