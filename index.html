<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Art Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #14152b;
    font-family: "Segoe UI", sans-serif;
  }

  .gallery {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px;
  }

  .card {
    width: 220px;
    padding: 28px 20px;
    border-radius: 12px;
    background: linear-gradient(160deg, #20223f, #15172c);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
    text-align: center;
    text-decoration: none;
    color: #f3e3b3;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
  }

  .card__title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .card__desc {
    font-size: 13px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="gallery">
    <a class="card" href="book/">
      <div class="card__title">3D Book Mockup</div>
      <div class="card__desc">Hardcover cover, spine &amp; pages</div>
    </a>
    <a class="card" href="sunset/">
      <div class="card__title">Mountain Sunset</div>
      <div class="card__desc">CSS gradient landscape scene</div>
    </a>
    <a class="card" href="calm-parenting/">
      <div class="card__title">Calm Parenting Bundle</div>
      <div class="card__desc">Editorial flat-lay product mockup</div>
    </a>
  </div>
</body>
</html>
