<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Art — Sunset Sky</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #cfe6f2;
    font-family: 'Segoe UI', sans-serif;
  }

  .scene { position: relative; width: 100vw; height: 100vh; }

  svg { display: block; width: 100%; height: 100%; }

  .caption {
    position: absolute;
    bottom: 14px;
    left: 0;
    width: 100%;
    text-align: center;
    color: rgba(40, 50, 30, 0.45);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .ray { animation: rayPulse 10s ease-in-out infinite; }
  @keyframes rayPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 0.8; }
  }

  .sparkle { animation: twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50%      { opacity: 1; }
  }

  .cloudwisp { animation: driftCloud 120s linear infinite; }
  @keyframes driftCloud {
    from { transform: translateX(-80px); }
    to   { transform: translateX(80px); }
  }

</style>
</head>

          <stop offset="28%"  stop-color="#4f9bdb"/>
          <stop offset="52%"  stop-color="#bcdcee"/>
          <stop offset="72%"  stop-color="#eef2da"/>
          <stop offset="100%" stop-color="#fbe9b9"/>
        </linearGradient>

        <radialGradient id="sunGlow" cx="2%" cy="98%" r="85%">
          <stop offset="0%"  stop-color="#fff7d6" stop-opacity="0.9"/>
          <stop offset="35%" stop-color="#ffe9a8" stop-opacity="0.5"/>
          <stop offset="70%" stop-color="#ffe9a8" stop-opacity="0.1"/>
          <stop offset="100%" stop-color="#ffe9a8" stop-opacity="0"/>
        </radialGradient>

        <filter id="rayBlur" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
        <filter id="turbCloud" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" seed="7" baseFrequency="0.12" numOctaves="3" result="noise"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blurred"/>
          <feDisplacementMap in="blurred" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="turbCloudWarm" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" seed="11" baseFrequency="0.15" numOctaves="3" result="noise"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blurred"/>
          <feDisplacementMap in="blurred" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
