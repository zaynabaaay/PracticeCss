<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Art — Sunlit Garden Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #cfe6f2;
    font-family: 'Segoe UI', sans-serif;
  }

  .scene { position: relative; width: 100vw; height: 100vh; }

  svg { display: block; width: 100%; height: 100%; }

  .caption {
    position: absolute;
    bottom: 14px;
    left: 0;
    width: 100%;
    text-align: center;
    color: rgba(40, 50, 30, 0.45);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .ray { animation: rayPulse 10s ease-in-out infinite; }
  @keyframes rayPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 0.8; }
  }

  .sparkle { animation: twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50%      { opacity: 1; }
  }

  .cloudwisp { animation: driftCloud 120s linear infinite; }
  @keyframes driftCloud {
    from { transform: translateX(-80px); }
    to   { transform: translateX(80px); }
  }

  .ripple { animation: rippleMove 7s ease-in-out infinite; }
  @keyframes rippleMove {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 0.55; }
  }
</style>
</head>

  <div class="scene">

        <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">

          <stop offset="40%" stop-color="#6cc0c4"/>
          <stop offset="100%" stop-color="#2477a0"/>

          <stop offset="0%" stop-color="#cdbf9e"/>
          <stop offset="100%" stop-color="#a89878"/>
        </linearGradient>

        <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="4"/>
        </filter>
        <filter id="rayBlur" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>

      <rect x="0" y="0" width="1536" height="1024" fill="url(#sky)"/>
